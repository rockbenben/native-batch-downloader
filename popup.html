<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eaeaea;
    --text-dim: #8892a4;
    --success: #2ed573;
    --warn: #ffa502;
    --fail: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 420px;
    min-height: 280px;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Noto Sans SC", "Noto Sans TC", sans-serif;
    font-size: 13px;
    padding: 16px;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 span { font-size: 18px; }

  textarea {
    width: 100%;
    height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    padding: 10px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 12px 0;
  }

  .controls label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .controls input[type="number"] {
    width: 64px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
    outline: none;
    text-align: center;
  }
  .controls input[type="number"]:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  button {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  #startBtn {
    background: var(--accent);
    color: #fff;
  }
  #startBtn:hover:not(:disabled) { background: var(--accent-hover); }
  #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  #stopBtn {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    flex: 0.5;
  }
  #stopBtn:hover:not(:disabled) { background: var(--border); color: var(--text); }
  #stopBtn:disabled { opacity: 0.3; cursor: not-allowed; }

  .stats {
    display: flex;
    gap: 14px;
    margin: 12px 0 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .stats .s { color: var(--success); font-weight: 600; }
  .stats .f { color: var(--fail); font-weight: 600; }
  .stats .w { color: var(--warn); font-weight: 600; }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar .fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  #log {
    max-height: 160px;
    overflow-y: auto;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text-dim);
    padding: 8px 0;
  }
  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #log .ok::before { content: "✓ "; color: var(--success); }
  #log .err::before { content: "✗ "; color: var(--fail); }
  #log .info::before { content: "→ "; color: var(--warn); }
</style>
</head>
<body>

<h1><span>⬇</span> <span id="titleText"></span></h1>

<textarea id="urls"></textarea>

<div class="controls">
  <label id="concLabel"></label>
  <input type="number" id="concurrency" value="10" min="1" max="200" step="1">
  <label id="delayLabel" style="margin-left:auto"></label>
  <input type="number" id="delay" value="0" min="0" max="10000" step="100">
  <label>ms</label>
</div>

<div class="btn-row">
  <button id="startBtn"></button>
  <button id="stopBtn" disabled></button>
</div>

<div class="stats">
  <span><span id="lblTotal"></span>: <b id="total">0</b></span>
  <span><span id="lblOk"></span>: <b id="ok" class="s">0</b></span>
  <span><span id="lblFail"></span>: <b id="fail" class="f">0</b></span>
  <span><span id="lblWait"></span>: <b id="wait" class="w">0</b></span>
</div>

<div class="progress-bar"><div class="fill" id="bar"></div></div>
<div id="log"></div>

<script src="popup.js"></script>
</body>
</html>
