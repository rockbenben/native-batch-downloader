<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  /* ===== Conveyor — a friendly little vending machine for files =====
     Cream cabinet, cobalt chassis, one red stop button. Chunky ink
     outlines, hard shadows, springy motion. Serious work, toy energy. */
  :root {
    --cream:    #f4edda;
    --card:     #fdfaf1;
    --ink:      #20242e;
    --ink-soft: #6f6852;
    --cobalt:   #2547e0;
    --cobalt-d: #1c38b5;
    --red:      #e8442e;
    --red-d:    #c4301c;
    --mint:     #237a52;
    --mint-bg:  #e2f3e7;
    --sun:      #f5b80c;
    --sun-d:    #a8790a;
    --sun-bg:   #fff3c9;
    --red-bg:   #fde7e2;
    --display: "BD Display", "Segoe UI", "Trebuchet MS", sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Cascadia Code", "Fira Code", ui-monospace, Consolas, monospace;
    --r: 13px;
  }
  /* CJK ideograph ranges overlap between SC/TC/JP, so those live in separate
     families picked by UI locale (popup.js sets <html lang> from @@ui_locale). */
  :root:lang(zh-CN) { --display: "BD Display SC", "BD Display", "Segoe UI", sans-serif; }
  :root:lang(zh-TW) { --display: "BD Display TC", "BD Display", "Segoe UI", sans-serif; }
  :root:lang(ja)    { --display: "BD Display JP", "BD Display", "Segoe UI", sans-serif; }
  :root:lang(ko)    { --display: "BD Display KR", "BD Display", "Segoe UI", sans-serif; }

  /* Display-font faces. The non-Latin files are exact-glyph subsets of the
     title/start/stop strings (a few KB each) — regenerate with
     scripts/subset-display-fonts.py whenever those messages change. */
  @font-face { font-family: "BD Display"; src: url("../fonts/bricolage-800-latin.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family: "BD Display"; src: url("../fonts/bricolage-800-latin-ext.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
  @font-face { font-family: "BD Display"; src: url("../fonts/bricolage-800-vietnamese.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB; }
  @font-face { font-family: "BD Display"; src: url("../fonts/display-arabic.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0600-06FF, U+0750-077F, U+08A0-08FF, U+FB50-FDFF, U+FE70-FEFF; }
  @font-face { font-family: "BD Display"; src: url("../fonts/display-devanagari.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0900-097F; }
  @font-face { font-family: "BD Display"; src: url("../fonts/display-bengali.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0980-09FF; }
  @font-face { font-family: "BD Display"; src: url("../fonts/display-thai.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0E00-0E7F; }
  @font-face { font-family: "BD Display"; src: url("../fonts/display-cyrillic.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+0400-04FF; }
  @font-face { font-family: "BD Display SC"; src: url("../fonts/display-sc.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+3000-303F, U+4E00-9FFF, U+FF00-FFEF; }
  @font-face { font-family: "BD Display TC"; src: url("../fonts/display-tc.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+3000-303F, U+4E00-9FFF, U+FF00-FFEF; }
  @font-face { font-family: "BD Display JP"; src: url("../fonts/display-jp.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+3000-30FF, U+4E00-9FFF, U+FF00-FFEF; }
  @font-face { font-family: "BD Display KR"; src: url("../fonts/display-kr.woff2") format("woff2"); font-weight: 800; font-display: swap; unicode-range: U+1100-11FF, U+3130-318F, U+AC00-D7AF; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    position: relative;
    width: 420px;
    min-height: 300px;
    padding: 16px;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  /* dotted machine-room floor */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(32, 36, 46, 0.11) 1px, transparent 1.2px);
    background-size: 20px 20px;
  }

  .cabinet { position: relative; z-index: 1; }

  /* ----- springy staggered entrance ----- */
  @keyframes pop {
    from { opacity: 0; transform: translateY(8px) scale(0.985); }
    to   { opacity: 1; transform: none; }
  }
  .cabinet > * { animation: pop 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both; }
  .cabinet > *:nth-child(1) { animation-delay: 0.02s; }
  .cabinet > *:nth-child(2) { animation-delay: 0.06s; }
  .cabinet > *:nth-child(3) { animation-delay: 0.10s; }
  .cabinet > *:nth-child(4) { animation-delay: 0.14s; }
  .cabinet > *:nth-child(5) { animation-delay: 0.18s; }
  .cabinet > *:nth-child(6) { animation-delay: 0.22s; }
  .cabinet > *:nth-child(7) { animation-delay: 0.26s; }
  .cabinet > *:nth-child(8) { animation-delay: 0.30s; }

  /* ----- header ----- */
  .hdr {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 13px;
  }
  .chute {
    flex: none;
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    background: var(--cobalt);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .chute svg {
    width: 21px; height: 21px;
    stroke: #fff; stroke-width: 2.6; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  /* the arrow bobs while the machine is running */
  @keyframes drop { 0%, 100% { transform: translateY(-1.5px); } 50% { transform: translateY(2px); } }
  body:has(#stopBtn:not(:disabled)) .chute svg {
    animation: drop 1.4s cubic-bezier(0.45, 0, 0.2, 1.4) infinite;
  }
  h1 {
    flex: 1;
    min-width: 0;
    font-family: var(--display);
    font-weight: 800;
    font-size: 18px;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  /* status lamp: cream when idle, sun-yellow blink while running */
  .led {
    flex: none;
    width: 13px; height: 13px;
    border: 2px solid var(--ink);
    border-radius: 50%;
    background: var(--card);
    transition: background 0.3s;
  }
  /* blink between deep and pale sun — never back to the idle white, so a
     glance always distinguishes running from idle */
  @keyframes lampblink { 50% { background: var(--sun-bg); } }
  body:has(#stopBtn:not(:disabled)) .led {
    background: var(--sun);
    animation: lampblink 1s steps(2, start) infinite;
  }

  /* ----- hopper (url input) ----- */
  textarea {
    display: block;
    width: 100%;
    height: 128px;
    padding: 10px 12px;
    background: var(--card);
    border: 2.5px solid var(--ink);
    border-radius: var(--r);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    /* URLs are LTR; keep the editor LTR even under an RTL UI locale */
    direction: ltr;
    text-align: left;
    resize: vertical;
    outline: none;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  textarea:focus {
    box-shadow: 4px 4px 0 var(--cobalt);
    transform: translate(-1px, -1px);
  }
  textarea::placeholder { color: var(--ink-soft); }
  textarea:disabled { opacity: 0.6; background: var(--cream); }
  textarea::-webkit-scrollbar { width: 10px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb {
    background: var(--ink);
    border: 3px solid var(--card);
    border-radius: 6px;
  }

  /* ----- dials ----- */
  .controls {
    display: grid;
    grid-template-columns: 1.1fr 1.1fr 0.9fr;
    gap: 9px;
    margin: 11px 0;
  }
  .dial {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 6px;
    text-align: center;
    background: var(--cream);
    border: 2.5px solid var(--ink);
    border-radius: var(--r);
    padding: 7px 8px 8px;
  }
  .dial label {
    font-size: 9px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .dial .with-unit {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .dial .unit { font-size: 10px; font-weight: 500; color: var(--ink-soft); }
  .dial input[type="number"] {
    width: 56px;
    margin: 0 auto;
    padding: 3px 4px;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 7px;
    color: var(--cobalt);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
         appearance: textfield;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  /* drop the native up/down spinners — they can't be themed to match */
  .dial input[type="number"]::-webkit-inner-spin-button,
  .dial input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
            appearance: none;
    margin: 0;
  }
  .dial input[type="number"]:focus {
    border-color: var(--cobalt);
    box-shadow: 2px 2px 0 var(--cobalt);
  }
  .dial input[type="number"]:disabled { opacity: 0.5; cursor: not-allowed; }
  .dial .with-unit input[type="number"] { margin: 0; }

  /* subfolder toggle, drawn to match the chunky dials */
  .dial input[type="checkbox"] {
    appearance: none;
    width: 23px; height: 23px;
    margin: 1px auto 2px;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 7px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 0.15s;
  }
  .dial input[type="checkbox"]:checked { background: var(--cobalt); }
  .dial input[type="checkbox"]:checked::after {
    content: "";
    width: 10px; height: 5px;
    margin-top: -2px;
    border: 2.5px solid #fff;
    border-top: none;
    border-inline-end: none;
    transform: rotate(-45deg);
  }
  .dial input[type="checkbox"]:focus-visible { outline: 3px solid var(--sun); outline-offset: 2px; }
  .dial input[type="checkbox"]:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ----- buttons ----- */
  .btn-row { display: flex; gap: 10px; }
  button {
    font-family: var(--display);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #fff;
    border: 2.5px solid var(--ink);
    border-radius: var(--r);
    padding: 11px 0;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s, background 0.15s, opacity 0.15s;
  }
  #startBtn { flex: 1.7; background: var(--cobalt); }
  #startBtn:hover:not(:disabled) { background: var(--cobalt-d); }
  #stopBtn { flex: 1; background: var(--red); }
  #stopBtn:hover:not(:disabled) { background: var(--red-d); }
  button:active:not(:disabled) {
    transform: translate(3px, 3px);
    box-shadow: 0 0 0 var(--ink);
  }
  button:disabled {
    opacity: 0.45;
    box-shadow: none;
    cursor: not-allowed;
  }
  button:focus-visible { outline: 3px solid var(--sun); outline-offset: 2px; }
  [hidden] { display: none !important; }

  /* retry: a sun-yellow service button that appears when failures remain */
  .retry {
    display: block;
    width: 100%;
    margin-bottom: 12px;
    background: var(--sun);
    color: var(--ink);
    font-size: 13px;
    padding: 9px 0;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .retry:hover:not(:disabled) { background: #e0a90b; }

  /* drop-a-file affordance while a drag hovers the popup */
  body.dragging textarea {
    border-style: dashed;
    border-color: var(--cobalt);
    box-shadow: 4px 4px 0 var(--cobalt);
  }

  /* ----- conveyor belt (progress) ----- */
  .meter { margin: 13px 0 0; }
  .belt {
    position: relative;
    height: 17px;
    background: var(--card);
    border: 2.5px solid var(--ink);
    border-radius: 99px;
    overflow: hidden;
  }
  .belt .fill {
    position: relative;
    height: 100%;
    width: 0%;
    background: var(--cobalt);
    border-inline-end: 2.5px solid var(--ink);
    border-start-start-radius: 99px;
    border-end-start-radius: 99px;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.3, 0.8, 0.2, 1);
  }
  /* parcels riding the belt while running */
  .belt .fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg,
      transparent 0 14px, rgba(255, 255, 255, 0.4) 14px 20px);
  }
  @keyframes convey { to { background-position: 20px 0; } }
  body:has(#stopBtn:not(:disabled)) .belt .fill::after {
    animation: convey 0.8s linear infinite;
  }

  /* ----- counters ----- */
  .stats {
    display: flex;
    gap: 8px;
    margin: 12px 0;
  }
  .tile {
    flex: 1;
    min-width: 0;
    text-align: center;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: var(--r);
    padding: 8px 4px 7px;
    box-shadow: 3px 3px 0 rgba(32, 36, 46, 0.16);
  }
  .tile b {
    display: block;
    font-family: var(--display);
    font-weight: 800;
    font-size: 21px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .tile span {
    display: block;
    margin-top: 3px;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .tile.ok   { background: var(--mint-bg); } .tile.ok b   { color: var(--mint); }
  .tile.fail { background: var(--red-bg); }  .tile.fail b { color: var(--red-d); }
  .tile.wait { background: var(--sun-bg); }  .tile.wait b { color: var(--sun-d); }

  /* ----- ticket log ----- */
  #log {
    max-height: 142px;
    overflow-y: auto;
    background: var(--cream);
    border: 2px dashed rgba(32, 36, 46, 0.45);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 11.5px;
    line-height: 1.6;
    color: #5a5340;
  }
  #log:empty { display: none; }
  #log div {
    padding: 3px 0;
    word-break: break-all;
    border-bottom: 1px dashed rgba(32, 36, 46, 0.14);
  }
  #log div:last-child { border-bottom: none; }
  #log .ok   { color: var(--ink); }
  #log .ok::before   { content: "✓ "; color: var(--mint); font-weight: 700; }
  #log .err  { color: var(--red-d); }
  #log .err::before  { content: "✗ "; font-weight: 700; }
  #log .info::before { content: "▸ "; color: var(--cobalt); font-weight: 700; }
  #log::-webkit-scrollbar { width: 7px; }
  #log::-webkit-scrollbar-thumb {
    background: rgba(32, 36, 46, 0.4);
    border-radius: 4px;
  }
  #log::-webkit-scrollbar-thumb:hover { background: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    .cabinet > *,
    .chute svg,
    .led,
    .belt .fill::after { animation: none !important; }
  }
</style>
</head>
<body>

<div class="cabinet">

  <header class="hdr">
    <span class="chute" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 4v10"/>
        <path d="M7.5 10.5 12 15l4.5-4.5"/>
        <path d="M5 20h14"/>
      </svg>
    </span>
    <h1 id="titleText"></h1>
    <span class="led" aria-hidden="true"></span>
  </header>

  <textarea id="urls" spellcheck="false"></textarea>

  <div class="controls">
    <div class="dial">
      <label id="concLabel" for="concurrency"></label>
      <input type="number" id="concurrency" value="10" min="1" max="200" step="1">
    </div>
    <div class="dial">
      <label id="delayLabel" for="delay"></label>
      <div class="with-unit">
        <input type="number" id="delay" value="0" min="0" max="10000" step="100">
        <span class="unit">ms</span>
      </div>
    </div>
    <div class="dial" id="folderDial">
      <label id="folderLabel" for="folder"></label>
      <input type="checkbox" id="folder" checked>
    </div>
  </div>

  <div class="btn-row">
    <button id="startBtn"></button>
    <button id="stopBtn" disabled></button>
  </div>

  <div class="meter">
    <div class="belt"><div class="fill" id="bar"></div></div>
  </div>

  <div class="stats">
    <div class="tile"><b id="total">0</b><span id="lblTotal"></span></div>
    <div class="tile ok"><b id="ok">0</b><span id="lblOk"></span></div>
    <div class="tile fail"><b id="fail">0</b><span id="lblFail"></span></div>
    <div class="tile wait"><b id="wait">0</b><span id="lblWait"></span></div>
  </div>

  <button id="retryBtn" class="retry" hidden></button>

  <div id="log" role="log" aria-live="polite"></div>

</div>

<script>
  // Screenshot stub: ?state=idle|running|done drives a realistic popup state.
  const state = new URLSearchParams(location.search).get("state") || "idle";
  const $id = (i) => document.getElementById(i);
  $id("titleText").textContent = "Native Batch Downloader";
  $id("concLabel").textContent = "Concurrency";
  $id("delayLabel").textContent = "Delay";
  $id("folderLabel").textContent = "Save to subfolder";
  $id("stopBtn").textContent = "Stop";
  $id("lblTotal").textContent = "Total";
  $id("lblOk").textContent = "OK";
  $id("lblFail").textContent = "Fail";
  $id("lblWait").textContent = "Wait";
  const URLS = [
    "https://archive.example.org/dataset/spring-survey.zip",
    "https://cdn.example.com/papers/field-notes-2026.pdf",
    "https://files.example.net/photos/yosemite-4k.jpg",
    "https://example.com/exports/orders-may.csv",
    "https://media.example.org/lecture-04.mp4",
    "https://example.com/maps/contour-tiles.zip",
  ].join("\n");
  $id("urls").value = URLS;
  $id("startBtn").textContent = "Start Download · 6";
  if (state === "running") {
    $id("startBtn").disabled = true;
    $id("stopBtn").disabled = false;
    $id("urls").disabled = true;
    $id("concurrency").disabled = true;
    $id("delay").disabled = true;
    $id("folder").disabled = true;
    $id("total").textContent = "148";
    $id("ok").textContent = "87";
    $id("fail").textContent = "2";
    $id("wait").textContent = "59";
    $id("startBtn").textContent = "Start Download · 148";
    $id("bar").style.width = "60%";
    $id("log").innerHTML = [
      '<div class="ok">yosemite-4k.jpg</div>',
      '<div class="ok">field-notes-2026.pdf</div>',
      '<div class="err">orders-may.csv — interrupted</div>',
      '<div class="ok">spring-survey.zip</div>',
      '<div class="info">Starting 148 downloads (concurrency 10)</div>',
    ].join("");
  } else if (state === "done") {
    $id("total").textContent = "148";
    $id("ok").textContent = "143";
    $id("fail").textContent = "5";
    $id("wait").textContent = "0";
    $id("bar").style.width = "100%";
    $id("retryBtn").hidden = false;
    $id("retryBtn").textContent = "Retry Failed · 5";
    $id("log").innerHTML = [
      '<div class="err">All done — 143 OK, 5 failed</div>',
      '<div class="ok">contour-tiles.zip</div>',
      '<div class="ok">lecture-04.mp4</div>',
      '<div class="err">orders-may.csv — interrupted</div>',
      '<div class="ok">yosemite-4k.jpg</div>',
    ].join("");
  }
</script>
</body>
</html>
